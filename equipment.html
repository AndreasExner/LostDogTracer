<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>LostDogTracer – Equipment</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .eq-card {
            display: flex; align-items: center; gap: 1rem;
            padding: 1rem; background: #fff; border: 1px solid #e8e8ed;
            border-radius: 10px; margin-bottom: 0.5rem; flex-wrap: wrap;
        }
        .eq-card .eq-info { flex: 1; min-width: 140px; }
        .eq-card .eq-info strong { display: block; font-size: 1rem; }
        .eq-card .eq-info small { color: #6e6e73; font-size: 0.8125rem; }
        .eq-card .eq-actions { display: flex; gap: 0.5rem; }
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35);
            z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff; border-radius: 14px; padding: 2rem;
            max-width: 400px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.2);
        }
        .modal h3 { margin-bottom: 1rem; font-size: 1.125rem; }
        .modal input {
            width: 100%; padding: 0.75rem 1rem; font-size: 1rem;
            border: 1px solid #d2d2d7; border-radius: 10px; outline: none;
            margin-bottom: 0.75rem;
        }
        .modal input:focus { border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,.15); }
        .modal-buttons { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem; }
        .modal-error { color: #ff3b30; font-size: 0.875rem; margin-top: 0.25rem; display: none; }
    </style>
</head>
<body>
    <div class="site-banner">Hundesuchhilfe-Ostfriesland e.V.</div>
    <div class="admin-container">
        <div class="admin-header">
            <h1>📦 Equipment</h1>
            <a href="index.html" class="btn-back">Zurück</a>
        </div>

        <div class="add-row">
            <button class="btn btn-primary" id="addBtn">+ Neues Equipment</button>
        </div>
        <div id="eqList"></div>

        <div id="toast" class="toast hidden"></div>
    </div>

    <!-- Modal: Create -->
    <div class="modal-overlay" id="createEqModal">
        <div class="modal">
            <h3>Neues Equipment</h3>
            <input type="text" id="newEqName" placeholder="Bezeichnung" autocomplete="off">
            <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;">
                <input type="text" id="newEqLocation" placeholder="Ort (optional)" autocomplete="off" style="flex:1;">
                <button type="button" class="btn btn-secondary btn-sm" id="newEqLocationSearch">🔍</button>
            </div>
            <input type="hidden" id="newEqLat">
            <input type="hidden" id="newEqLng">
            <p class="modal-error" id="createEqError"></p>
            <div class="modal-buttons">
                <button class="btn btn-secondary btn-sm" id="createEqCancel">Abbrechen</button>
                <button class="btn btn-primary btn-sm" id="createEqSave">Anlegen</button>
            </div>
        </div>
    </div>

    <!-- Modal: Edit -->
    <div class="modal-overlay" id="editEqModal">
        <div class="modal">
            <h3>Equipment bearbeiten</h3>
            <input type="text" id="editEqName" placeholder="Bezeichnung" autocomplete="off">
            <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;">
                <input type="text" id="editEqLocation" placeholder="Ort (optional)" autocomplete="off" style="flex:1;">
                <button type="button" class="btn btn-secondary btn-sm" id="editEqLocationSearch">🔍</button>
            </div>
            <input type="hidden" id="editEqLat">
            <input type="hidden" id="editEqLng">
            <p class="modal-error" id="editEqError"></p>
            <div class="modal-buttons">
                <button class="btn btn-secondary btn-sm" id="editEqCancel">Abbrechen</button>
                <button class="btn btn-primary btn-sm" id="editEqSave">Speichern</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        FT_AUTH.requireRole(3);
    </script>
    <script src="js/equipment.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
