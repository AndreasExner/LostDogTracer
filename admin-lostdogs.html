<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>LostDogTracer – Hunde verwalten</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="site-banner">Hundesuchhilfe-Ostfriesland e.V.</div>
    <div class="admin-container">
        <div class="admin-header">
            <h1>Hunde verwalten</h1>
            <a href="admin.html" class="btn-back">Zurück</a>
        </div>

        <div class="add-row">
            <input type="text" id="newDog" placeholder="Neuer Hundename…" maxlength="100"
                   autocomplete="off">
            <button class="btn btn-primary" id="addBtn">Hinzufügen</button>
        </div>

        <ul class="item-list" id="dogList"></ul>

        <div id="toast" class="toast hidden"></div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        FT_AUTH.isLoggedIn().then(ok => { if (!ok) location.href = 'admin.html'; });
    </script>
    <script src="js/admin-lostdogs.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/admin-nav.js"></script>
</body>
</html>
