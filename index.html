<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffffff">
    <title>LostDogTracer</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="manifest" href="manifest.json">
    <style>
        .landing-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            text-align: center;
        }
        .landing-logo {
            max-width: 430px;
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="site-banner">Hundesuchhilfe-Ostfriesland e.V.</div>
    <div class="landing-container">
        <img src="gfx/lostdogtracer-logo-860w.png"
             srcset="gfx/lostdogtracer-logo-430w.png 430w,
                     gfx/lostdogtracer-logo-860w.png 860w,
                     gfx/lostdogtracer-logo-1290w.png 1290w"
             sizes="(max-width: 480px) 430px, 860px"
             alt="LostDogTracer Logo"
             class="landing-logo">
    </div>
    <script src="js/theme.js"></script>
</body>
</html>
