<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>LostDogTracer – Admin-Konten</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .user-card {
            display: flex; align-items: center; gap: 1rem;
            padding: 1rem; background: #fff; border: 1px solid #e8e8ed;
            border-radius: 10px; margin-bottom: 0.5rem; flex-wrap: wrap;
        }
        .user-card .user-info { flex: 1; min-width: 140px; }
        .user-card .user-info strong { display: block; font-size: 1rem; }
        .user-card .user-info small { color: #6e6e73; font-size: 0.8125rem; }
        .user-card .user-actions { display: flex; gap: 0.5rem; }

        /* Modal overlay */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35);
            z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff; border-radius: 14px; padding: 2rem;
            max-width: 400px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.2);
        }
        .modal h3 { margin-bottom: 1rem; font-size: 1.125rem; }
        .modal input {
            width: 100%; padding: 0.75rem 1rem; font-size: 1rem;
            border: 1px solid #d2d2d7; border-radius: 10px; outline: none;
            margin-bottom: 0.75rem;
        }
        .modal input:focus { border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,.15); }
        .modal-buttons { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem; }
        .modal-error { color: #ff3b30; font-size: 0.875rem; margin-top: 0.25rem; display: none; }

        .section-title { font-size: 1rem; font-weight: 600; color: #6e6e73; margin: 1.5rem 0 0.75rem; }
    </style>
</head>
<body>
    <div class="site-banner">Hundesuchhilfe-Ostfriesland e.V.</div>
    <div class="admin-container">
        <div class="admin-header">
            <h1>🔑 Admin-Konten</h1>
            <a href="admin.html" class="btn-back">Zurück</a>
        </div>

        <!-- Own password change -->
        <p class="section-title">Eigenes Kennwort ändern</p>
        <div class="user-card" style="background:#f0f4ff">
            <div class="user-info">
                <strong id="currentUser">—</strong>
                <small>Angemeldet als</small>
            </div>
            <div class="user-actions">
                <button class="btn btn-secondary btn-sm" id="changePwBtn">Kennwort ändern</button>
            </div>
        </div>

        <!-- User list -->
        <p class="section-title">Alle Admin-Benutzer</p>
        <div class="add-row">
            <button class="btn btn-primary" id="addUserBtn">+ Neuen Admin anlegen</button>
        </div>
        <div id="userList"></div>

        <div id="toast" class="toast hidden"></div>
    </div>

    <!-- Modal: Change own password -->
    <div class="modal-overlay" id="changePwModal">
        <div class="modal">
            <h3>Eigenes Kennwort ändern</h3>
            <input type="password" id="oldPw" placeholder="Aktuelles Kennwort" autocomplete="current-password">
            <input type="password" id="newPw" placeholder="Neues Kennwort (min. 8 Zeichen)" autocomplete="new-password">
            <input type="password" id="newPw2" placeholder="Neues Kennwort wiederholen" autocomplete="new-password">
            <p class="modal-error" id="changePwError"></p>
            <div class="modal-buttons">
                <button class="btn btn-secondary btn-sm" id="changePwCancel">Abbrechen</button>
                <button class="btn btn-primary btn-sm" id="changePwSave">Speichern</button>
            </div>
        </div>
    </div>

    <!-- Modal: Create user -->
    <div class="modal-overlay" id="createUserModal">
        <div class="modal">
            <h3>Neuen Admin anlegen</h3>
            <input type="text" id="newUsername" placeholder="Benutzername" autocomplete="off">
            <input type="text" id="newDisplayName" placeholder="Anzeigename" autocomplete="off">
            <input type="password" id="newUserPw" placeholder="Kennwort (min. 8 Zeichen)" autocomplete="new-password">
            <p class="modal-error" id="createUserError"></p>
            <div class="modal-buttons">
                <button class="btn btn-secondary btn-sm" id="createUserCancel">Abbrechen</button>
                <button class="btn btn-primary btn-sm" id="createUserSave">Anlegen</button>
            </div>
        </div>
    </div>

    <!-- Modal: Reset password -->
    <div class="modal-overlay" id="resetPwModal">
        <div class="modal">
            <h3>Kennwort zurücksetzen für: <span id="resetPwUser"></span></h3>
            <input type="password" id="resetNewPw" placeholder="Neues Kennwort (min. 8 Zeichen)" autocomplete="new-password">
            <p class="modal-error" id="resetPwError"></p>
            <div class="modal-buttons">
                <button class="btn btn-secondary btn-sm" id="resetPwCancel">Abbrechen</button>
                <button class="btn btn-primary btn-sm" id="resetPwSave">Zurücksetzen</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        FT_AUTH.isLoggedIn().then(ok => { if (!ok) location.href = 'admin.html'; });
    </script>
    <script src="js/admin-users.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/admin-nav.js"></script>
</body>
</html>
