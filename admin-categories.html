<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>LostDogTracer – Kategorien verwalten</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .svg-preview { width:36px; height:48px; flex-shrink:0; }
        .svg-preview svg { display:block; }
        .category-item { display:flex; align-items:center; gap:0.75rem; padding:0.5rem 0; }
        .category-item .item-name { flex:1; font-weight:600; }
        .category-item textarea { width:100%; font-family:monospace; font-size:0.75rem; margin-top:0.35rem; }
        .category-actions { display:flex; gap:0.4rem; flex-shrink:0; }
        .upload-label { cursor:pointer; font-size:0.75rem; color:#0071e3; text-decoration:underline; margin-top:0.2rem; display:inline-block; }
        .upload-label input { display:none; }
    </style>
</head>
<body>
    <div class="site-banner">Hundesuchhilfe-Ostfriesland e.V.</div>
    <div class="admin-container">
        <div class="admin-header">
            <h1>Kategorien verwalten</h1>
            <a href="admin.html" class="btn-back">Zurück</a>
        </div>

        <div class="add-row" style="flex-wrap:wrap;gap:0.5rem;">
            <input type="text" id="newCategory" placeholder="Neue Kategorie…" maxlength="100"
                   autocomplete="off" style="flex:1;min-width:150px;">
            <textarea id="newSvg" placeholder="SVG-Symbol (innere Elemente, cx=12 cy=12)" rows="2"
                      style="flex:1 1 100%;font-family:monospace;font-size:0.8rem;"></textarea>
            <label class="btn btn-secondary btn-sm" style="cursor:pointer;margin:0;">
                SVG-Datei… <input type="file" id="newSvgFile" accept=".svg" hidden>
            </label>
            <div id="newPreview" class="svg-preview"></div>
            <button class="btn btn-primary" id="addBtn">Hinzufügen</button>
        </div>

        <ul class="item-list" id="categoryList"></ul>

        <div id="toast" class="toast hidden"></div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        FT_AUTH.isLoggedIn().then(ok => { if (!ok) location.href = 'admin.html'; });
    </script>
    <script src="js/admin-categories.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/admin-nav.js"></script>
</body>
</html>
