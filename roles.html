<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Rollen – LostDogTracer</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="site-banner">LostDogTracer</div>
    <div class="admin-container">
        <div class="admin-header">
            <h1>🛡️ Rollen &amp; Berechtigungen</h1>
        </div>

        <div id="toast" class="toast"></div>

        <!-- Role list -->
        <div id="roleList" class="card-list"></div>

        <!-- Add role form -->
        <div class="card" id="addRoleCard" style="margin-top:1.5rem;">
            <h3>Neue Rolle anlegen</h3>
            <input type="text" id="newRoleId" placeholder="Rollen-ID (z.B. helfer2)" style="width:100%;margin-bottom:0.5rem;">
            <input type="text" id="newRoleName" placeholder="Anzeigename (z.B. Helfer Erweitert)" style="width:100%;margin-bottom:0.75rem;">
            <div id="newRolePerms" class="perm-grid"></div>
            <button class="btn btn-primary" id="addRoleBtn" style="margin-top:0.75rem;">Rolle anlegen</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
