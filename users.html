<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>LostDogTracer – Benutzer</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .user-card {
            display: flex; align-items: center; gap: 1rem;
            padding: 1rem; background: #fff; border: 1px solid #e8e8ed;
            border-radius: 10px; margin-bottom: 0.5rem; flex-wrap: wrap;
        }
        .user-card .user-info { flex: 1; min-width: 140px; }
        .user-card .user-info strong { display: block; font-size: 1rem; }
        .user-card .user-info small { color: #6e6e73; font-size: 0.8125rem; }
        .user-card .user-actions { display: flex; gap: 0.5rem; }

        /* Modal overlay */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35);
            z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff; border-radius: 14px; padding: 2rem;
            max-width: 400px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.2);
        }
        .modal h3 { margin-bottom: 1rem; font-size: 1.125rem; }
        .modal input {
            width: 100%; padding: 0.75rem 1rem; font-size: 1rem;
            border: 1px solid #d2d2d7; border-radius: 10px; outline: none;
            margin-bottom: 0.75rem;
        }
        .modal input:focus { border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,.15); }
        .modal-buttons { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem; }
        .modal-error { color: #ff3b30; font-size: 0.875rem; margin-top: 0.25rem; display: none; }

        .section-title { font-size: 1rem; font-weight: 600; color: #6e6e73; margin: 1.5rem 0 0.75rem; }
    </style>
</head>
<body>
    <div class="site-banner">Hundesuchhilfe-Ostfriesland e.V.</div>
    <div class="admin-container">
        <div class="admin-header">
            <h1>🔑 Benutzer</h1>
            <a href="index.html" class="btn-back">Zurück</a>
        </div>

        <!-- User list -->
        <p class="section-title">Alle Benutzer</p>
        <div class="add-row">
            <button class="btn btn-primary" id="addUserBtn">+ Neuen Benutzer anlegen</button>
        </div>
        <div id="userList"></div>

        <div id="toast" class="toast hidden"></div>
    </div>

    <!-- Modal: Create user -->
    <div class="modal-overlay" id="createUserModal">
        <div class="modal">
            <h3>Neuen Benutzer anlegen</h3>
            <input type="text" id="newUsername" placeholder="Benutzername" autocomplete="off">
            <input type="text" id="newDisplayName" placeholder="Anzeigename" autocomplete="off">
            <div class="pw-wrap">
                <input type="password" id="newUserPw" placeholder="Kennwort (min. 8 Zeichen)" autocomplete="new-password">
                <button type="button" class="pw-toggle" tabindex="-1">&#x1F441;</button>
            </div>
            <select id="newUserRole" style="width:100%;padding:0.75rem 1rem;font-size:1rem;border:1px solid #d2d2d7;border-radius:10px;outline:none;margin-bottom:0.75rem;">
                <option value="User" selected>User</option>
                <option value="PowerUser">PowerUser</option>
                <option value="Manager">Manager</option>
                <option value="Administrator">Administrator</option>
            </select>
            <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;">
                <input type="text" id="newUserLocation" placeholder="Ort (optional)" autocomplete="off" style="flex:1;">
                <button type="button" class="btn btn-secondary btn-sm" id="newUserLocationSearch">🔍</button>
            </div>
            <input type="hidden" id="newUserLat">
            <input type="hidden" id="newUserLng">
            <p class="modal-error" id="createUserError"></p>
            <div class="modal-buttons">
                <button class="btn btn-secondary btn-sm" id="createUserCancel">Abbrechen</button>
                <button class="btn btn-primary btn-sm" id="createUserSave">Anlegen</button>
            </div>
        </div>
    </div>

    <!-- Modal: Reset password -->
    <div class="modal-overlay" id="resetPwModal">
        <div class="modal">
            <h3>Kennwort zurücksetzen für: <span id="resetPwUser"></span></h3>
            <div class="pw-wrap">
                <input type="password" id="resetNewPw" placeholder="Neues Kennwort (min. 8 Zeichen)" autocomplete="new-password">
                <button type="button" class="pw-toggle" tabindex="-1">&#x1F441;</button>
            </div>
            <p class="modal-error" id="resetPwError"></p>
            <div class="modal-buttons">
                <button class="btn btn-secondary btn-sm" id="resetPwCancel">Abbrechen</button>
                <button class="btn btn-primary btn-sm" id="resetPwSave">Zurücksetzen</button>
            </div>
        </div>
    </div>

    <!-- Modal: Edit user (role + displayName) -->
    <div class="modal-overlay" id="editUserModal">
        <div class="modal">
            <h3>Benutzer bearbeiten: <span id="editUserName"></span></h3>
            <input type="text" id="editDisplayName" placeholder="Anzeigename" autocomplete="off">
            <select id="editUserRole" style="width:100%;padding:0.75rem 1rem;font-size:1rem;border:1px solid #d2d2d7;border-radius:10px;outline:none;margin-bottom:0.75rem;">
                <option value="User">User</option>
                <option value="PowerUser">PowerUser</option>
                <option value="Manager">Manager</option>
                <option value="Administrator">Administrator</option>
            </select>
            <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;">
                <input type="text" id="editUserLocation" placeholder="Ort (optional)" autocomplete="off" style="flex:1;">
                <button type="button" class="btn btn-secondary btn-sm" id="editUserLocationSearch">🔍</button>
            </div>
            <input type="hidden" id="editUserLat">
            <input type="hidden" id="editUserLng">
            <p class="modal-error" id="editUserError"></p>
            <div class="modal-buttons">
                <button class="btn btn-secondary btn-sm" id="editUserCancel">Abbrechen</button>
                <button class="btn btn-primary btn-sm" id="editUserSave">Speichern</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        FT_AUTH.requireRole(3);
    </script>
    <script src="js/users.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
