<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>LostDogTracer – Feld-Karte</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
</head>
<body>
    <div class="site-banner">Hundesuchhilfe-Ostfriesland e.V.</div>
    <div class="admin-container" style="max-width: 1200px;">
        <div class="admin-header">
            <h1>📍 Karte</h1>
            <a href="field-home.html" class="btn-back">Zurück</a>
        </div>

        <div class="map-info">
            <span class="badge" id="filterInfo"></span>
            <span class="badge" id="markerCount">0 Standorte</span>
            <select id="scopeFilter" title="Bereich" style="padding:0.35rem 0.5rem;font-size:0.8125rem;border:1px solid #d2d2d7;border-radius:8px;outline:none;">
                <option value="mine" selected>Meine Standorte</option>
                <option value="all">Alle Standorte</option>
            </select>
            <label class="toggle-badge" title="Laufroute anzeigen">
                <input type="checkbox" id="toggleRoutes"> Routen
            </label>
            <label class="toggle-badge" title="Live-Standort anzeigen">
                <input type="checkbox" id="toggleLocation"> 📍 Mein Standort
            </label>
        </div>
        <div class="legend" id="legend"></div>

        <div id="map"></div>

        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="js/auth.js"></script>
    <script>
        FT_AUTH.requireRole(1);
    </script>
    <script src="js/svg-icons.js"></script>
    <script src="js/field-map.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/field-nav.js"></script>
</body>
</html>
