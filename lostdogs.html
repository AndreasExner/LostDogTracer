<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>LostDogTracer – Hunde verwalten</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35);
            z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff; border-radius: 14px; padding: 2rem;
            max-width: 400px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.2);
        }
        .modal h3 { margin-bottom: 1rem; font-size: 1.125rem; }
        .modal input {
            width: 100%; padding: 0.75rem 1rem; font-size: 1rem;
            border: 1px solid #d2d2d7; border-radius: 10px; outline: none;
            margin-bottom: 0.75rem;
        }
        .modal input:focus { border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,.15); }
        .modal-buttons { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem; }
        .modal-error { color: #ff3b30; font-size: 0.875rem; margin-top: 0.25rem; display: none; }
    </style>
</head>
<body>
    <div class="site-banner">Hundesuchhilfe-Ostfriesland e.V.</div>
    <div class="admin-container">
        <div class="admin-header">
            <h1>Hunde verwalten</h1>
            <a href="index.html" class="btn-back">Zurück</a>
        </div>

        <div class="add-row">
            <button class="btn btn-primary" id="addBtn">+ Neuen Hund anlegen</button>
        </div>

        <ul class="item-list" id="dogList"></ul>

        <div id="toast" class="toast hidden"></div>
    </div>

    <!-- Modal: Create dog -->
    <div class="modal-overlay" id="createDogModal">
        <div class="modal">
            <h3>Neuen Hund anlegen</h3>
            <input type="text" id="newDogName" placeholder="Name des Hundes" autocomplete="off" maxlength="100">
            <input type="text" id="newDogLocation" placeholder="Ort (optional)" autocomplete="off" maxlength="100">
            <p class="modal-error" id="createDogError"></p>
            <div class="modal-buttons">
                <button class="btn btn-secondary btn-sm" id="createDogCancel">Abbrechen</button>
                <button class="btn btn-primary btn-sm" id="createDogSave">Anlegen</button>
            </div>
        </div>
    </div>

    <!-- Modal: Edit dog -->
    <div class="modal-overlay" id="editDogModal">
        <div class="modal">
            <h3>Hund bearbeiten: <span id="editDogTitle"></span></h3>
            <input type="text" id="editDogDisplayName" placeholder="Anzeigename" autocomplete="off" maxlength="200">
            <p class="modal-error" id="editDogError"></p>
            <div class="modal-buttons">
                <button class="btn btn-secondary btn-sm" id="editDogCancel">Abbrechen</button>
                <button class="btn btn-primary btn-sm" id="editDogSave">Speichern</button>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        FT_AUTH.requireRole(3);
    </script>
    <script src="js/lostdogs.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
