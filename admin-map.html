<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>LostDogTracer – Karte</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
</head>
<body>
    <div class="site-banner">Hundesuchhilfe-Ostfriesland e.V.</div>
    <div class="admin-container" style="max-width: 1200px;">
        <div class="admin-header">
            <h1>📍 Karte</h1>
            <a href="admin-gpsrecords.html" class="btn-back">Zurück</a>
        </div>

        <div class="map-info">
            <span class="badge" id="markerCount">0 Standorte</span>
            <select id="filterName" class="map-select" title="Filter nach Name">
                <option value="">Alle Namen</option>
            </select>
            <select id="filterDog" class="map-select" title="Filter nach Hund">
                <option value="">Alle Hunde</option>
            </select>
            <div class="multi-select" id="categoryMultiSelect">
                <button class="multi-select-btn map-select" type="button" id="filterCategoryBtn">Alle Kategorien</button>
                <div class="multi-select-dropdown hidden" id="filterCategoryDropdown"></div>
            </div>
            <label class="toggle-badge" title="GPS-Genauigkeit als Kreis anzeigen">
                <input type="checkbox" id="toggleCircles"> Genauigkeit
            </label>
            <label class="toggle-badge" title="Laufroute pro Hund anzeigen">
                <input type="checkbox" id="toggleRoutes"> Routen
            </label>
        </div>
        <div class="legend" id="legend"></div>

        <div id="map"></div>

        <div id="toast" class="toast hidden"></div>

        <!-- Edit bar (position only) -->
        <div id="editBar" class="edit-bar hidden">
            <span id="editCoordsHint">📍 Position verschieben…</span>
            <button class="btn btn-primary btn-sm" id="editSaveBtn">Speichern</button>
            <button class="btn btn-secondary btn-sm" id="editCancelBtn">Abbrechen</button>
            <button class="btn btn-danger btn-sm" id="editDeleteBtn">Löschen</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="js/auth.js"></script>
    <script>
        FT_AUTH.isLoggedIn().then(ok => { if (!ok) location.href = 'admin.html'; });
    </script>
    <script src="js/admin-map.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/admin-nav.js"></script>
</body>
</html>
