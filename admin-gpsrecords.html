<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>FlyerTracker – GPS-Daten</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>GPS-Daten</h1>
            <a href="admin.html" class="back-link">← Admin-Menü</a>
        </div>

        <!-- Toolbar: filter, sort, page-size, actions -->
        <div class="toolbar">
            <select id="filterName" title="Filter nach Name">
                <option value="">Alle Namen</option>
            </select>

            <select id="filterDog" title="Filter nach Hund">
                <option value="">Alle Hunde</option>
            </select>

            <select id="filterCategory" title="Filter nach Kategorie">
                <option value="">Alle Kategorien</option>
            </select>

            <select id="sortField" title="Sortierung">
                <option value="time-desc" selected>Zeitpunkt ↓ (neueste)</option>
                <option value="time-asc">Zeitpunkt ↑ (älteste)</option>
                <option value="name-asc">Name A–Z</option>
                <option value="name-desc">Name Z–A</option>
                <option value="dog-asc">Hund A–Z</option>
                <option value="dog-desc">Hund Z–A</option>
            </select>

            <select id="pageSize" title="Einträge pro Seite">
                <option value="20" selected>20 pro Seite</option>
                <option value="40">40 pro Seite</option>
                <option value="all">Alle anzeigen</option>
            </select>

            <button class="btn btn-secondary btn-sm" id="showMapBtn">🗺️ Karte</button>
        </div>

        <!-- Data table -->
        <div class="table-wrap">
            <table class="data-table">
                <thead>
                    <tr>
                        <th><input type="checkbox" id="selectAll" title="Alle auswählen"></th>
                        <th>Name</th>
                        <th>Hund</th>
                        <th>Kategorie</th>
                        <th>Kommentar</th>
                        <th>Foto</th>
                        <th>Breitengrad</th>
                        <th>Längengrad</th>
                        <th>Genauigkeit</th>
                        <th>Zeitpunkt</th>
                    </tr>
                </thead>
                <tbody id="recordsBody"></tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination">
            <span class="info" id="pageInfo"></span>
            <div class="page-buttons" id="pageButtons"></div>
        </div>

        <!-- Actions below table -->
        <div class="toolbar" style="margin-top: 0.75rem;">
            <button class="btn btn-secondary btn-sm" id="exportKmlBtn">KML Export</button>
            <button class="btn btn-secondary btn-sm" id="exportCsvBtn">CSV Export</button>
            <button class="btn btn-danger btn-sm" id="deleteSelectedBtn" disabled>Ausgewählte löschen</button>
        </div>

        <div id="toast" class="toast hidden"></div>

        <!-- Photo lightbox -->
        <div id="lightbox" class="lightbox hidden" onclick="this.classList.add('hidden')">
            <img id="lightboxImg" alt="Foto">
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        FT_AUTH.isLoggedIn().then(ok => { if (!ok) location.href = 'admin.html'; });
    </script>
    <script src="js/admin-gpsrecords.js"></script>
</body>
</html>
