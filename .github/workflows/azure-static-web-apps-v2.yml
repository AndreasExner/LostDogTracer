name: Deploy v2 to Azure Static Web App

on:
  push:
    branches:
      - v2

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy v2
    steps:
      - uses: actions/checkout@v4

      - name: Replace placeholders
        run: |
          find . -type f \( -name '*.js' -o -name '*.html' \) -exec sed -i "s|%%PROD_API_KEY%%|${{ secrets.API_KEY_V2 }}|g" {} +
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_VERSION="v2-${SHORT_SHA}-$(date -u +%Y%m%d)"
          find . -type f \( -name '*.js' -o -name '*.html' \) -exec sed -i "s|%%BUILD_VERSION%%|${BUILD_VERSION}|g" {} +
          find . -type f \( -name '*.js' -o -name '*.html' \) -exec sed -i "s|%%DEPLOY_ENV%%|v2|g" {} +

      - name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN_V2 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: api
          output_location: /
          skip_app_build: true
        env:
          STORAGE_CONNECTION_STRING: ${{ secrets.STORAGE_CONNECTION_STRING_V2 }}
          API_KEY: ${{ secrets.API_KEY_V2 }}
          TOKEN_SECRET: ${{ secrets.TOKEN_SECRET_V2 }}
          SYSTEM_SECRET: ${{ secrets.SYSTEM_SECRET_V2 }}
          ADMIN_SEED_USERNAME: admin
          ADMIN_SEED_PASSWORD: ${{ secrets.ADMIN_SEED_PASSWORD_V2 }}
