name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build API
        run: dotnet publish api/FlyerTracker.Api.csproj -c Release -o api/bin/Release/net8.0/publish

      - name: Deploy to SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: "api/bin/Release/net8.0/publish"
          output_location: ""
          skip_app_build: true
          skip_api_build: true
        env:
          AZURE_FUNCTIONS_API_LANGUAGE: dotnetisolated
          AZURE_FUNCTIONS_API_LANGUAGE_VERSION: "8"
