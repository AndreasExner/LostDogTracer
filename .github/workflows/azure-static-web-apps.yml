name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set environment
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "SWA_TOKEN=${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" >> $GITHUB_ENV
            echo "DEPLOY_API_KEY=${{ secrets.PROD_API_KEY }}" >> $GITHUB_ENV
            echo "DEPLOY_ENV=prod" >> $GITHUB_ENV
          else
            echo "SWA_TOKEN=${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV }}" >> $GITHUB_ENV
            echo "DEPLOY_API_KEY=${{ secrets.DEV_API_KEY }}" >> $GITHUB_ENV
            echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
          fi

      - name: Inject API key
        run: |
          ESCAPED_KEY=$(printf '%s\n' "$DEPLOY_API_KEY" | sed 's/[&/\]/\\&/g')
          sed -i "s/%%PROD_API_KEY%%/${ESCAPED_KEY}/g" js/auth.js
          sed -i "s/%%PROD_API_KEY%%/${ESCAPED_KEY}/g" js/guest-app.js
          sed -i "s/%%PROD_API_KEY%%/${ESCAPED_KEY}/g" js/theme.js

      - name: Inject build version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_HASH=$(git rev-parse --short HEAD)
          BUILD_VERSION="v1.3.${COMMIT_COUNT}-${SHORT_HASH}"
          sed -i "s/%%BUILD_VERSION%%/${BUILD_VERSION}/g" js/nav.js
          sed -i "s/%%BUILD_VERSION%%/${BUILD_VERSION}/g" js/guest-nav.js
          sed -i "s/%%BUILD_VERSION%%/${BUILD_VERSION}/g" js/field-nav.js
          sed -i "s/%%BUILD_VERSION%%/${BUILD_VERSION}/g" sw.js

      - name: Inject deploy environment
        run: |
          sed -i "s/%%DEPLOY_ENV%%/${DEPLOY_ENV}/g" js/theme.js

      - name: Deploy to SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: "api"
          output_location: ""
          skip_app_build: true
